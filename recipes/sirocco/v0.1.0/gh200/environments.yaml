sirocco:
  compiler: [gcc]
  # network:
  #   mpi: cray-mpich@9.1 +cuda
  specs:
    - python@3.14
    # No need anymore with pygraphviz2.0 => necessary libs distributed by wheels
    # - graphviz@14.0.1
  # variants:
  #   - +mpi
  #   - +cuda
  #   - cuda_arch=90a
  unify: true
  views:
    bare:
      link: roots
      uenv:
        add_compilers: true
        prefix_paths:
          LD_LIBRARY_PATH: [lib, lib64]
    app:
      link: roots
      uenv:
        prefix_paths:
          LD_LIBRARY_PATH: [lib, lib64]
        env_vars:
          set:
            - VIRTUAL_ENV: "/user-tools/sirocco_venv"
            - VIRTUAL_ENV_PROMPT: "༄ sirocco ༄"
          prepend_path:
            - PATH: "/user-tools/sirocco_venv/bin"
