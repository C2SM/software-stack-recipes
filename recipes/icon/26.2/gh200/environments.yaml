icon:
  compiler: [gcc, nvhpc]
  network:
    mpi: cray-mpich@8.1.30 +cuda
  unify: true
  specs:
  # - boost ~mpi
  - python@3.10
  - cuda@12.6.0
  - eccodes@2.36.4 +tools +fortran +aec +openmp jp2k=jasper %c,cxx,fortran=nvhpc
  - eccodes-cosmo-resources@2.36.0.3
  - hdf5@1.14.6 +szip +hl +fortran +mpi %c,fortran=nvhpc
  - netcdf-c@4.9.3 %c=nvhpc
  - netcdf-cxx4@4.3.1 %cxx=nvhpc
  - netcdf-fortran@4.6.2 %c,fortran=nvhpc
  - openblas %c,cxx,fortran=nvhpc
  - findutils 
  # # for validation
  # - cdo
  # # everything needed for nccl on SS11
  # - nccl
  # - nccl-tests
  # # extras
  # - libfyaml
  # - zlib-ng
  # - cmake
  variants:
  - +mpi
  - +cuda
  - cuda_arch=90
  views:
    default:
      link: roots
      uenv:
        prefix_paths:
          LD_LIBRARY_PATH: [lib, lib64]
