fdb:
  compiler:
    - toolchain: gcc
      spec: gcc@13.3
  unify: when_possible
  mpi: null
  packages: []
  specs:
    - fdb@=5.19.1 backends=lustre
    - gribjump@=0.10.3
    - eckit@=2.0.2 linalg=none compression=lz4 +curl +ssl
    - metkit@=1.16.3-levelist
    - eccodes@=2.46.0 jp2k=none ~fortran +pthreads +aec +geo
    - ecbuild@=3.13.1
    - python@=3.11.6
  variants:
    - ~mpi
  views:
    realtime:
      link: roots
      uenv:
        prefix_paths:
          LD_LIBRARY_PATH: [lib, lib64]
    rea-l-ch1:
      link: roots
      uenv:
        prefix_paths:
          LD_LIBRARY_PATH: [lib, lib64]
    remote-devt:
      link: roots
      uenv:
        prefix_paths:
          LD_LIBRARY_PATH: [lib, lib64]
    remote-depl:
      link: roots
      uenv:
        prefix_paths:
          LD_LIBRARY_PATH: [lib, lib64]
